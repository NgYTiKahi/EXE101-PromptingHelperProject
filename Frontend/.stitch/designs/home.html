<!-- Micro-interactions Script -->
<script>
        // Simple textarea auto-resize and basic interactions
        const textarea = document.querySelector('textarea');
        textarea.addEventListener('input', function() {
            this.style.height = 'auto';
            const newHeight = Math.min(this.scrollHeight, 240);
            this.style.height = (newHeight > 128 ? newHeight : 128) + 'px';
        });

        // Focus ring effect simulation on outer container
        const container = textarea.parentElement;
        textarea.addEventListener('focus', () => {
            container.classList.add('ring-1', 'ring-outline');
        });
        textarea.addEventListener('blur', () => {
            container.classList.remove('ring-1', 'ring-outline');
        });
    </script>
