<script>
        // Simple micro-interaction for the left background
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('floaty-elements');
            if (!container) return;

            const symbols = ['π', 'Σ', '√', '∫', 'Δ'];
            for (let i = 0; i < 15; i++) {
                const span = document.createElement('span');
                span.textContent = symbols[Math.floor(Math.random() * symbols.length)];
                span.className = 'absolute text-2xl font-display-logo transition-all duration-1000 ease-in-out';
                span.style.left = Math.random() * 100 + '%';
                span.style.top = Math.random() * 100 + '%';
                span.style.color = '#2f855a';
                span.style.opacity = '0.2';
                container.appendChild(span);
                
                // Random floating animation
                setInterval(() => {
                    span.style.transform = `translate(${Math.random() * 20 - 10}px, ${Math.random() * 20 - 10}px)`;
                }, 2000 + Math.random() * 3000);
            }
        });
    </script>
