<html class="dark" lang="en"><head>

<title>Login | Prompt Helper</title>

<style>
        body {
            background-color: #0b0f19; /* Deep Space Base per Brand Anchors */
            font-family: 'Geist', sans-serif;
            color: #dfe2f1;
        }
        
        .login-card {
            background-color: #1a202c; /* Midnight Gray per Form Card requirement */
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.15); /* Subtle Neon Violet Glow */
            border: 1px solid #2d3748;
        }

        .input-field {
            background-color: #1a202c;
            border: 1px solid #2d3748;
            transition: all 0.2s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: #8b5cf6;
            box-shadow: inset 0 0 4px rgba(139, 92, 246, 0.2);
        }

        .primary-button {
            background-color: #8b5cf6; /* Neon Violet */
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .primary-button:hover {
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.4);
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        .secondary-button {
            background-color: transparent;
            border: 1px solid #2d3748;
            transition: background-color 0.2s ease;
        }

        .secondary-button:hover {
            background-color: #2d3748;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col selection:bg-primary/30">
<!-- Top Navigation (Shell logic: Minimal TopAppBar) -->
<header class="flex justify-center items-center w-full py-xl px-md">
<h1 class="text-headline-md font-headline-md font-bold text-on-background tracking-tight">
            Prompt Helper
        </h1>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center px-md pb-3xl">
<div class="login-card w-full max-w-[420px] rounded-xl p-xl flex flex-col gap-lg">
<!-- Welcome Header -->
<div class="space-y-xs text-center">
<h2 class="text-headline-lg font-headline-lg text-white">Welcome Back</h2>
<p class="text-body-md font-body-md text-on-surface-variant">Precision prompting awaits.</p>
</div>
<!-- Form -->
<form class="flex flex-col gap-md" onsubmit="return false;">
<!-- Username -->
<div class="flex flex-col gap-xs">
<label class="text-label-sm font-label-sm text-[#9ca3af] uppercase tracking-wider" for="username">
                        Username
                    </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline text-[20px]">person</span>
<input class="input-field w-full py-md pl-[44px] pr-md rounded-lg text-white font-label-md text-label-md placeholder:text-outline-variant" id="username" placeholder="Enter your identifier" type="text"/>
</div>
</div>
<!-- Password -->
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-end">
<label class="text-label-sm font-label-sm text-[#9ca3af] uppercase tracking-wider" for="password">
                            Password
                        </label>
<a class="text-label-sm font-label-sm text-primary hover:text-white transition-colors" href="#">
                            Forgot password?
                        </a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline text-[20px]">lock</span>
<input class="input-field w-full py-md pl-[44px] pr-md rounded-lg text-white font-label-md text-label-md placeholder:text-outline-variant" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Sign In CTA -->
<button class="primary-button w-full py-md mt-sm rounded-lg text-white font-label-md text-label-md font-bold uppercase tracking-widest active:scale-[0.98]" type="submit">
                    Sign In
                </button>
</form>
<!-- Divider -->
<div class="flex items-center gap-md py-xs">
<div class="h-[1px] flex-grow bg-surface-variant"></div>
<span class="text-label-sm font-label-sm text-outline-variant">OR</span>
<div class="h-[1px] flex-grow bg-surface-variant"></div>
</div>
<!-- Social Auth -->
<button class="secondary-button w-full py-md rounded-lg text-white font-label-md text-label-md flex items-center justify-center gap-md group">
<svg fill="none" height="18" viewbox="0 0 18 18" width="18" xmlns="http://www.w3.org/2000/svg">
<path d="M17.64 9.20455C17.64 8.56636 17.5827 7.95273 17.4764 7.36364H9V10.845H13.8436C13.635 11.97 13.0009 12.9232 12.0477 13.5614V15.8195H14.9564C16.6582 14.2527 17.64 11.9455 17.64 9.20455Z" fill="#4285F4"></path>
<path d="M9 18C11.43 18 13.4673 17.1941 14.9564 15.8195L12.0477 13.5614C11.2418 14.1014 10.2109 14.4205 9 14.4205C6.65591 14.4205 4.67182 12.8373 3.96409 10.71H0.957275V13.0418C2.43818 15.9832 5.48182 18 9 18Z" fill="#34A853"></path>
<path d="M3.96409 10.71C3.78409 10.17 3.68182 9.59318 3.68182 9C3.68182 8.40682 3.78409 7.83 3.96409 7.29V4.95818H0.957275C0.347727 6.17318 0 7.54773 0 9C0 10.4523 0.347727 11.8268 0.957275 13.0418L3.96409 10.71Z" fill="#FBBC05"></path>
<path d="M9 3.57955C10.3214 3.57955 11.5077 4.03364 12.4405 4.92545L15.0218 2.34409C13.4632 0.891818 11.4259 0 9 0C5.48182 0 2.43818 2.01682 0.957275 4.95818L3.96409 7.29C4.67182 5.16273 6.65591 3.57955 9 3.57955Z" fill="#EA4335"></path>
</svg>
<span>Continue with Google</span>
</button>
<!-- Sign Up Footer -->
<div class="text-center pt-md border-t border-surface-variant/30">
<p class="text-body-md font-body-md text-on-surface-variant">
                    Don't have an account? 
                    <a class="text-primary hover:underline ml-xs" href="#">Sign up</a>
</p>
</div>
</div>
</main>
<!-- Footer (Shell Logic: Suppression for task-focused page, but following Footer Anchor for branding) -->
<footer class="w-full py-xl flex flex-col items-center gap-base opacity-60">
<div class="flex gap-lg">
<a class="text-label-sm font-label-sm text-on-secondary-fixed-variant hover:text-on-surface transition-colors" href="#">Terms of Service</a>
<a class="text-label-sm font-label-sm text-on-secondary-fixed-variant hover:text-on-surface transition-colors" href="#">Privacy Policy</a>
<a class="text-label-sm font-label-sm text-on-secondary-fixed-variant hover:text-on-surface transition-colors" href="#">Contact Support</a>
</div>
<p class="text-label-sm font-label-sm text-on-secondary-fixed-variant mt-sm">© 2024 Prompt Helper. All rights reserved.</p>
</footer>
<!-- Micro-interactions Script -->
<script>
        // Subtle input focus animations or form handling could go here
        document.querySelectorAll('.input-field').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('.material-symbols-outlined').style.color = '#8b5cf6';
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('.material-symbols-outlined').style.color = '';
            });
        });

        // Basic button scale effect
        const buttons = document.querySelectorAll('button');
        buttons.forEach(btn => {
            btn.addEventListener('mousedown', () => btn.style.transform = 'scale(0.98)');
            btn.addEventListener('mouseup', () => btn.style.transform = '');
            btn.addEventListener('mouseleave', () => btn.style.transform = '');
        });
    </script>
</body></html>
